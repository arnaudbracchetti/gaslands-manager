<!-- Carte d'une équipe Gaslands -->
<!--
  team() appelle le signal input pour lire sa valeur.
  Les outputs émettent l'équipe vers le composant parent via (click).
-->
<div class="team-card">

  <!-- Nom de l'équipe -->
  <div class="team-card__header">
    <h2 class="team-card__name">{{ team().name }}</h2>
  </div>

  <!-- Sponsor + budget sur la même ligne -->
  <div class="team-card__info">
    <span class="team-card__badge">{{ team().sponsor }}</span>
    <span class="team-card__cans">🥫 {{ team().cans }} jerricans</span>
  </div>

  <!-- Description : masquée si vide ou absente -->
  @if (team().description) {
    <p class="team-card__description">{{ team().description }}</p>
  }

  <!--
    Liste des véhicules de l'équipe — masquée si vide (équipe sans véhicule,
    ou résumé pas encore chargé : les deux cas se traduisent par un tableau
    vide côté `Teams`, cf. doc de `vehicles`).
    Le coût est désormais TOUJOURS exact : le backend résout le prix de la Tourelle
    (3× le prix de l'arme assignée) dans `improvement.prix` — plus besoin du "≈"
    ni de `coutApproximatif` (cf. `VehicleSummary`, `VehicleService.toVehicleDto`).
  -->
  @if (vehicles().length > 0) {
    <ul class="team-card__vehicles">
      @for (vehicle of vehicles(); track vehicle.id) {
        <li class="team-card__vehicle">
          <span class="team-card__vehicle-name">{{ vehicle.nom }}</span>
          <span class="team-card__vehicle-cost">{{ vehicle.cout }} 🥫</span>
          <!--
            Actions par véhicule — émettent une `TeamVehiclePair` (équipe courante
            + véhicule visé), cf. doc de `editVehicleClicked`/`deleteVehicleClicked`.
            Mirroir visuel des boutons d'action sur l'équipe (`.btn-action--*`),
            déclinés en plus petit (`.btn-vehicle-action--*`) pour tenir sur une ligne.
          -->
          <span class="team-card__vehicle-actions">
            <button
              class="btn-vehicle-action btn-vehicle-action--edit"
              (click)="editVehicleClicked.emit({ team: team(), vehicle })"
              title="Gérer l'équipement de ce véhicule">
              ✏️
            </button>
            <button
              class="btn-vehicle-action btn-vehicle-action--delete"
              (click)="deleteVehicleClicked.emit({ team: team(), vehicle })"
              title="Supprimer ce véhicule">
              🗑
            </button>
          </span>
        </li>
      }
    </ul>
  }

  <!-- Bouton "Ajouter un véhicule" — toujours visible (cf. doc de addVehicleClicked) -->
  <button
    class="btn-add-vehicle"
    (click)="addVehicleClicked.emit(team())"
    title="Ajouter un véhicule à cette équipe">
    🚗 Ajouter un véhicule
  </button>

  <!-- Boutons Modifier / Supprimer -->
  <div class="team-card__actions">
    <button
      class="btn-action btn-action--edit"
      (click)="editClicked.emit(team())"
      title="Modifier cette équipe">
      ✏️ Modifier
    </button>
    <button
      class="btn-action btn-action--delete"
      (click)="deleteClicked.emit(team())"
      title="Supprimer cette équipe">
      🗑 Supprimer
    </button>
  </div>

</div>
