<!--
  VehicleCostSummary — nom du véhicule, emplacements et coût (ex partie haute
  de `.em-current__header`, après `app-team-budget`).
-->
<h3 class="vcs-name" [title]="vehicleName()">{{ vehicleName() }}</h3>

<div class="vcs-slots">
  <span class="vcs-slots__label">Emplacements</span>
  <app-slot-gauge [used]="emplacementsUtilises()" [total]="emplacementsTotal()" size="md" />
</div>

<div class="vcs-cost">
  <p class="vcs-cost-row">
    <span>Base</span>
    <span>{{ coutBase() }} <img class="vcs-icon" src="/icons/dollar.svg" alt="" /></span>
  </p>
  <p class="vcs-cost-row">
    <span>+ Équipement</span>
    <span>{{ coutEquipement() }} <img class="vcs-icon" src="/icons/dollar.svg" alt="" /></span>
  </p>
  <p class="vcs-cost-row vcs-cost-row--total">
    <span>Total</span>
    <span>{{ coutTotal() }} <img class="vcs-icon" src="/icons/dollar.svg" alt="" /></span>
  </p>
</div>
