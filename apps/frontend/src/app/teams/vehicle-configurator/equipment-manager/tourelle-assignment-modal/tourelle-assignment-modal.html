<!--
  TourelleAssignmentModal — overlay de sélection d'arme pour une Tourelle orpheline.

  Structure :
  - Fond semi-transparent couvrant l'écran (.tam-overlay)
  - Boîte de dialogue centrale (.tam-modal) avec :
    - Titre + note de prix (3× le prix de l'arme)
    - Liste des armes disponibles, chacune avec nom + stats (coût total + emplacements)
    - Bouton Annuler

  Chaque arme de la liste émet `weaponChosen` avec son `nom_interne` au clic.
  Le bouton Annuler émet `cancelled`.
-->
<div class="tam-overlay" role="dialog" aria-modal="true"
     aria-label="Choisir l'arme de la Tourelle">
  <div class="tam-modal">
    <h4 class="tam-modal__title">Choisir l'arme de la Tourelle</h4>
    <p class="tam-modal__hint">
      Prix affiché = 3 × le prix de l'arme (tout compris — l'arme est incluse dans la Tourelle).
    </p>

    <ul class="tam-modal__list">
      @for (arme of armes(); track arme.nom_interne) {
        <li>
          <!--
            Structure visuelle calquée sur EquipmentOption (.option__info + .option__stat) :
            nom en gras à gauche, stats grises à droite (coût en jerricans + emplacements).
            Le prix affiché = 3 × le prix de l'arme (coût total Tourelle incluse).
          -->
          <button
            class="tam-modal__option"
            type="button"
            (click)="weaponChosen.emit(arme.nom_interne)">
            <span class="tam-modal__option-name">{{ arme.nom }}</span>
            <span class="tam-modal__option-stats">
              <span class="tam-modal__option-stat"
                    title="Coût total en jerricans (Tourelle incluse)">{{ arme.prix * 3 }} 🛢️</span>
              <span class="tam-modal__option-stat"
                    title="Emplacements requis par cette arme">🔧 {{ arme.emplacement }}</span>
            </span>
          </button>
        </li>
      } @empty {
        <li>
          <p class="tam-modal__empty">Aucune arme disponible pour ce sponsor.</p>
        </li>
      }
    </ul>

    <button
      class="tam-modal__cancel"
      type="button"
      (click)="cancelled.emit()">
      Annuler
    </button>
  </div>
</div>
