<!--
  Page de construction/édition d'un véhicule.
  Le lien de retour dépend de returnTo : TeamEditPage ou liste des équipes.
-->
<div class="vcp-page">

  <div class="vcp-header">
    <a class="vcp-back" [routerLink]="backRoute()">{{ backLabel() }}</a>
    <h1>{{ vehicleId() === null ? 'Ajouter un véhicule' : "Gérer l'équipement du véhicule" }}</h1>
  </div>

  @if (loading()) {
    <p class="vcp-status vcp-status--loading">Chargement…</p>
  } @else if (error()) {
    <p class="vcp-status vcp-status--error">{{ error() }}</p>
  } @else if (team(); as t) {
    <app-vehicle-configurator
      [team]="t"
      [vehicleId]="vehicleId()"
      (done)="onDone()" />
  }

</div>
