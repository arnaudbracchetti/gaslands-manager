<!--
  Overlay plein écran + contenu projeté.

  @if (visible()) : en zoneless, l'affichage conditionnel doit passer par un
  Signal lu dans le template — exactement le rôle de `visible` ici (cf. CLAUDE.md,
  "Angular zoneless").

  (click) sur l'overlay émet une demande de fermeture ; (click) sur le contenu
  stoppe la propagation pour ne PAS déclencher celui de l'overlay (cf. Modal.onContentClick).
-->
@if (visible()) {
  <div class="modal-overlay" (click)="onOverlayClick()">
    <div class="modal-content" (click)="onContentClick($event)">

      <div class="modal-header">
        @if (title()) {
          <h2 class="modal-title">{{ title() }}</h2>
        }
        <button
          class="modal-close"
          type="button"
          (click)="closeRequested.emit()"
          aria-label="Fermer la fenêtre">
          ✕
        </button>
      </div>

      <!-- <ng-content /> : projection du contenu fourni par le composant parent
           (cf. ARCHITECTURE.md §2.5 — Modal ne connaît pas ce qu'il affiche). -->
      <div class="modal-body">
        <ng-content />
      </div>

    </div>
  </div>
}
