<!-- Formulaire de création / modification d'une équipe -->
<div class="team-form-card">

  <!-- Titre dynamique : "Nouvelle équipe" ou "Modifier l'équipe" -->
  <h2>{{ formTitle() }}</h2>

  <!-- Erreur de validation locale (ex : nom manquant) -->
  @if (formError()) {
    <div class="form-error">{{ formError() }}</div>
  }

  <div class="form-grid">

    <!-- Nom de l'équipe -->
    <div class="form-group">
      <label for="team-name">Nom de l'équipe *</label>
      <input
        id="team-name"
        type="text"
        placeholder="Ex : Les Furieux du Désert"
        [ngModel]="formName()"
        (ngModelChange)="formName.set($event)" />
    </div>

    <!-- Budget en jerricans -->
    <div class="form-group">
      <label for="team-cans">Budget (Jerricans)</label>
      <input
        id="team-cans"
        type="number"
        min="0"
        [ngModel]="formCans()"
        (ngModelChange)="formCans.set(+$event)" />
    </div>

    <!-- Description (pleine largeur) -->
    <div class="form-group form-group--full">
      <label for="team-desc">Description</label>
      <textarea
        id="team-desc"
        rows="3"
        placeholder="Décrivez votre équipe (optionnel)..."
        [ngModel]="formDescription()"
        (ngModelChange)="formDescription.set($event)">
      </textarea>
    </div>

    <!-- Carousel de sélection du sponsor (pleine largeur) -->
    <div class="form-group form-group--full">
      @if (loadingSponsors()) {
        <!--
          Spinner pendant le chargement du catalogue.
          Le formulaire reste utilisable (les autres champs ne dépendent pas des sponsors).
        -->
        <div class="sponsors-loading">
          <span class="sponsors-loading__dot"></span>
          <span class="sponsors-loading__dot"></span>
          <span class="sponsors-loading__dot"></span>
          <span class="sponsors-loading__text">Chargement des sponsors…</span>
        </div>
      } @else {
        <!--
          SponsorCarousel : passe le sponsor sélectionné, la liste et l'état de verrouillage.
          (sponsorChange) met à jour formSponsor à chaque changement de page.
        -->
        <app-sponsor-carousel
          [selectedSponsor]="formSponsor()"
          [locked]="hasVehicles()"
          [sponsors]="sponsors()"
          (sponsorChange)="formSponsor.set($event)" />
      }
    </div>

  </div>

  <!-- Boutons Annuler / Enregistrer -->
  <div class="form-actions">
    <button class="btn-secondary" type="button" (click)="cancelForm()" [disabled]="saving()">
      Annuler
    </button>
    <button class="btn-primary" type="button" (click)="saveForm()" [disabled]="saving()">
      @if (saving()) { Enregistrement... } @else { Enregistrer }
    </button>
  </div>

</div>
