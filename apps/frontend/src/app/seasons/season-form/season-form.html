<!-- Formulaire de création d'une saison -->
<div class="season-form-card">

  <h2>➕ Nouvelle saison</h2>

  @if (formError()) {
    <div class="form-error">{{ formError() }}</div>
  }

  @if (noTeams()) {
    <!-- CA3 : aucune équipe disponible — empêche la soumission -->
    <div class="form-info">
      Vous devez d'abord créer une équipe pour participer à une saison.
    </div>
  } @else {
    <div class="form-grid">

      <!-- Nom de la saison -->
      <div class="form-group">
        <label for="season-name">Nom de la saison *</label>
        <input
          id="season-name"
          type="text"
          placeholder="Ex : Coupe Verney"
          [ngModel]="formName()"
          (ngModelChange)="formName.set($event)" />
      </div>

      <!-- Équipe engagée -->
      <div class="form-group">
        <label for="season-team">Équipe engagée *</label>
        <select
          id="season-team"
          [ngModel]="formTeamId()"
          (ngModelChange)="formTeamId.set(+$event)">
          @for (team of teams(); track team.id) {
            <option [value]="team.id">{{ team.name }}</option>
          }
        </select>
      </div>

    </div>
  }

  <!-- Boutons Annuler / Enregistrer -->
  <div class="form-actions">
    <button class="btn-secondary" type="button" (click)="cancelForm()" [disabled]="saving()">
      Annuler
    </button>
    @if (!noTeams()) {
      <button class="btn-primary" type="button" (click)="saveForm()" [disabled]="saving()">
        @if (saving()) { Enregistrement... } @else { Enregistrer }
      </button>
    }
  </div>

</div>
