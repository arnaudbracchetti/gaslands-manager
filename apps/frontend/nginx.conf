# ============================================================
# Configuration nginx — Frontend Angular (Gaslands)
#
# nginx joue deux rôles ici :
#   1. Serveur de fichiers statiques (HTML/JS/CSS compilés)
#   2. Reverse proxy pour les appels API → backend NestJS
#
# En développement, le proxy est géré par proxy.conf.json
# (serveur de dev Angular). En production Docker, c'est nginx
# qui prend le relais.
# ============================================================

server {
    # nginx écoute sur le port 80 dans le container.
    # docker-compose mappe le port 4200 du host → port 80 du container.
    listen 80;

    # Dossier contenant les fichiers statiques Angular compilés
    # (copié depuis dist/apps/frontend/browser/ pendant le docker build)
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy API : délégation au backend NestJS ──────────────
    # Toutes les requêtes commençant par /api/ sont transmises
    # au service "backend" sur le réseau Docker interne.
    #
    # "backend" est le NOM DU SERVICE dans docker-compose.yml.
    # Docker résout automatiquement ce nom en adresse IP interne
    # (DNS Docker). C'est le mécanisme de service discovery Docker.
    #
    # Sans ce proxy, le navigateur enverrait les appels /api/*
    # directement sur localhost:4200, où nginx ne sait pas les traiter.
    location /api/ {
        # On conserve le préfixe /api/ dans l'URL transmise au backend
        # (NestJS a setGlobalPrefix('api'), donc il attend /api/...)
        proxy_pass http://backend:3000;

        # Transmission des headers originaux pour que NestJS
        # puisse identifier la requête source (logs, CORS…)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout augmenté pour les longues requêtes éventuelles
        proxy_read_timeout 60s;
    }

    # ── SPA fallback : support du routeur Angular ─────────────
    # Angular utilise le HTML5 History API (URLs sans #).
    # Sans ce fallback, nginx renverrait 404 pour toute URL
    # autre que "/" si l'utilisateur recharge la page ou accède
    # directement à /teams, /rules, etc.
    #
    # try_files : nginx cherche d'abord un fichier correspondant à
    # l'URL ($uri), puis un dossier ($uri/), et sinon retourne
    # index.html pour que Angular gère le routage.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
