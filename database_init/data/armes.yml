  - nom: "Canon à Arc Électrique"
    type: "avancée"
    prix: 6
    emplacement: 2
    description: |
      Arme électrique à **Portée Double** lançant **6D6**, capable de chaîner ses attaques entre plusieurs cibles proches.
    regles: |
      - **1 Munition**.
      - **Électrique**.
      - Après avoir endommagé une cible, le véhicule doit immédiatement attaquer une autre cible depuis la cible actuelle, à Portée Courte maximum et avec un Arc de Tir à 360°.
      - La nouvelle cible peut être un véhicule ami ou le véhicule actif lui-même.
      - La réaction en chaîne continue jusqu’à ce que l’arme échoue à endommager une cible ou qu’il n’y ait plus de cible valide.
      - Le même véhicule ne peut pas être ciblé deux fois lors d’une même Étape d’Attaque par ce Canon à Arc Électrique.
      - Arme réservée aux équipes sponsorisées par Mishkin.
    sponsors_autorises:
      - "Mishkin"

