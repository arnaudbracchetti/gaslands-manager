    type: "avancée"
    prix: 2
    emplacement: 1
    description: |
      Arme à **Portée Double** lançant **5D6**, conçue pour pivoter ou tracter la cible.
    regles: |
      - Les touches n’infligent aucun dégât.
      - La première touche non annulée fait pivoter la cible vers le véhicule actif ou à l’opposé, selon la rotation la plus faible.
      - Ce pivot ouvre une Fenêtre de Collision.
      - Chaque touche non annulée suivante force la cible à effectuer un déplacement forcé avec le gabarit droit Court en direction du véhicule actif.
      - Si la cible est d’un Poids supérieur à celui du véhicule actif, c’est le véhicule actif qui est tracté vers la cible.
      - Si plusieurs harpons touchent la même cible, les touches sont combinées comme si elles provenaient d’une seule attaque.
