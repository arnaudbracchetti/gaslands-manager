  - nom: "Boule de démolition"
    type: "avancée"
    prix: 2
    emplacement: 3
    description: |
      Arme de contact à **Portée Courte**, conçue pour provoquer des collisions latérales en chaîne.
    regles: |
      - Ne nécessite pas de cible identifiée.
      - Lorsqu’elle est utilisée, le véhicule effectue immédiatement une Collision Latérale avec chaque véhicule et obstacle Destructible à Portée Courte dans un Arc de Tir à 360°.
      - Le propriétaire choisit l’ordre de résolution.
      - Tous les véhicules impliqués sont considérés comme n’ayant aucune arme ou avantage, à l’exception de la Boule de démolition.
      - Les autres véhicules doivent annoncer une réaction d’Esquive.
      - À chaque Collision, le véhicule actif gagne +2 dés d’attaque pour l’Éperonnage.
      - Le véhicule actif ne prend pas de Jeton Danger durant ces Collisions.
      - Les Collisions déclenchées par cette arme ne bénéficient pas d’améliorations comme Bélier ou Bélier Explosif.
      - Les modificateurs de différence de Poids s’appliquent normalement.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

