  - nom: "Lance-Carcasse"
    type: "avancée"
    prix: 4
    emplacement: 4
    description: |
      Arme lourde à **Portée Double** ou **Larguée**, qui projette ou dépose des épaves de voitures.
    regles: |
      - **3 Munitions**.
      - **Trébuchet** : ne nécessite pas de cible identifiée. Placez un marqueur d’environ 2 cm à Portée Double maximum dans l’Arc de Tir, puis lancez un Dé de Manœuvre.
      - Sur **Embrayage**, placez une Épave de Voiture en contact avec le marqueur et ouvrez une Fenêtre de Collision.
      - Sur **Rotation** ou **Dérapage**, le joueur à gauche du joueur actif place l’Épave n’importe où à Portée Courte maximum du marqueur et ouvre une Fenêtre de Collision.
      - Sur **Danger**, le joueur à gauche du joueur actif place l’Épave en contact du véhicule actif et ouvre une Fenêtre de Collision.
      - **Ferrailleur** : si le véhicule entre en Collision avec une Épave, il résout la Collision normalement puis gagne 1 Jeton Munition pour le Lance-Carcasse.
      - **Largueur** : le véhicule peut utiliser le Lance-Carcasse comme arme largable montée à l’arrière. Dans ce cas, l’Épave est placée au contact de l’arrière du véhicule actif sans ouvrir de Fenêtre de Collision avec lui.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
