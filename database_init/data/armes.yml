      - Si la cible est d’une classe de Poids identique ou inférieure et subit au moins 1 touche non annulée, le propriétaire du véhicule actif peut la placer n’importe où à Portée Courte maximum de sa position initiale.
      - La cible peut être pivotée dans n’importe quelle direction.
      - Ce déplacement peut ouvrir une Fenêtre de Collision.
