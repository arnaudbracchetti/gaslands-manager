# ── Catalogue des armes Gaslands ──────────────────────────────────────────────
#
# Ce fichier est chargé une seule fois au démarrage par CatalogService.
# Chaque arme déclare les sponsors autorisés à l'équiper via sponsors_autorises.
#
# Structure de chaque entrée :
#   nom          — Nom affiché dans l'UI
#   nom_interne  — Identifiant technique stable (snake_case, sans accents)
#   type         — Catégorie : base | avancée | équipage | largable
#                  • base     : arme standard montée sur châssis, orientée à l'achat
#                  • avancée  : arme spéciale, souvent avec munitions ou effet unique
#                  • équipage : utilisée par un membre d'équipage, arc 360°, emplacement 0
#                  • largable : déposée/projetée derrière le véhicule
#   prix         — Coût en Jerricans à l'achat
#   emplacement  — Slots occupés sur le véhicule (0 = n'occupe pas de slot)
#   description  — Texte libre affiché dans l'UI (flavor text)
#   regles       — Règles spéciales au format liste Markdown
#                  Les munitions sont notées ici : "**N Munitions**."
#   sponsors_autorises — Sponsors pouvant équiper cette arme
#                  Si seul "Mishkin" figure dans la liste, l'arme est électrique/exclusive.
#
# Note sur Rutherford : les armes avec 3 munitions de départ passent à 4 munitions
# gratuitement à l'achat pour Rutherford (règle décrite dans sponsors.yml,
# aucun doublon YAML nécessaire).

