# ── Catalogue des améliorations de véhicule Gaslands ──────────────────────────
#
# Ce fichier est chargé une seule fois au démarrage par CatalogService.
# Chaque amélioration déclare les sponsors autorisés à l'acheter via sponsors_autorises.
#
# Structure de chaque entrée :
#   nom          — Nom affiché dans l'UI
#   nom_interne  — Identifiant technique stable (snake_case, sans accents)
#                  Format variante sponsor : "<amelioration>_<sponsor>"
#                  Ex : "nitro_idris" pour la Nitro à moitié prix pour Idris.
#                  Items exclusifs : nom descriptif simple (ex: "megaphone").
#   prix         — Coût en Jerricans.
#                  Cas particulier : la Tourelle utilise "x3" (string, pas un nombre).
#                  Cela signifie que son coût = 3× le prix de l'arme montée dessus.
#                  La Tourelle ne s'applique qu'aux armes (jamais aux améliorations).
#   emplacement  — Slots occupés sur le véhicule (0 = n'occupe pas de slot)
#   description  — Texte libre affiché dans l'UI
#   regles       — Règles spéciales au format liste Markdown
#   sponsors_autorises — Sponsors pouvant acheter cette amélioration
#
# Convention pour les variantes sponsor :
#   Quand un sponsor bénéficie d'un prix réduit ou d'un emplacement modifié,
#   on crée une variante :
#     - La variante porte "(Sponsor)" dans son nom affiché
#     - La variante a un nom_interne avec suffixe sponsor
#     - Le sponsor est RETIRÉ de l'original (qui garde les autres sponsors)
#   Ainsi chaque sponsor voit exactement une version de l'amélioration.

ameliorations_vehicules:

  # ── Améliorations standard (disponibles à tous les sponsors) ──────────────

  - nom: "Arceaux"
    nom_interne: "arceaux"
    prix: 4
    emplacement: 1
    description: |
      Structure de protection permettant de préserver la carrosserie lors des tonneaux.
    regles: |
      - Lorsque ce véhicule part en Tonneau, il peut choisir d'ignorer les deux dégâts infligés par le Tonneau.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Bélier standard (tous les sponsors SAUF Slime) ────────────────────────
  - nom: "Bélier"
    nom_interne: "belier"
    comportement: "belier"
    prix: 4
    emplacement: 1
    description: |
      Arme de combat rapproché attachée au véhicule augmentant les dégâts d'impact et protégeant contre le danger.
    regles: |
      - Lorsque vous achetez cette amélioration, vous devez définir son orientation, comme pour une arme.
      - Un véhicule ne peut acheter qu'un seul Bélier par orientation.
      - Lorsqu'il est impliqué dans une Collision sur l'orientation définie, ce véhicule peut ajouter 2 dés d'attaque à son Éperonnage.
      - Ce véhicule ne prend pas les Jetons Danger suite à cette Collision.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Variante Slime : Bélier sans emplacement ──────────────────────────────
  - nom: "Bélier (Slime)"
    nom_interne: "belier_slime"
    comportement: "belier"
    prix: 4
    emplacement: 0
    description: |
      Version du bélier de choc modifiée par l'équipe Slime pour ne requérir aucun emplacement.
    regles: |
      - Règle exclusive Sponsor (Slime - Hérissé) : Cette équipe considère que l'amélioration Bélier ne requiert aucun Emplacement pour son montage.
      - Lors de l'achat, vous devez définir son orientation, comme pour une arme.
      - Un véhicule ne peut acheter qu'un seul Bélier par orientation.
      - Lorsqu'il est impliqué dans une Collision sur l'orientation définie, ce véhicule peut ajouter 2 dés d'attaque à son Éperonnage.
      - Ce véhicule ne prend pas les Jetons Danger suite à cette Collision.
    sponsors_autorises:
      - "Slime"

  - nom: "Bélier Explosif"
    nom_interne: "belier_explosif"
    comportement: "belier_explosif"
    prix: 3
    emplacement: 0
    description: |
      Charge d'impact jetable interdite aux véhicules légers octroyant un bonus d'attaque massif lors de la première collision.
    regles: |
      - Cette amélioration dispose d'une limitation initiale fixée à 1 munition.
      - Lorsque vous achetez cette amélioration, vous devez définir son orientation, comme pour une arme.
      - Un véhicule ne peut acheter cette amélioration qu'une seule fois.
      - Cette amélioration ne peut pas être achetée pour les véhicules de Poids Léger.
      - La première fois de la partie que ce véhicule est impliqué dans une Collision sur l'orientation définie, son propriétaire doit annoncer un Éperonnage, même en cas de Collision Arrière.
      - Lors de cet Éperonnage, ce véhicule gagne +6 dés d'attaque.
      - Si des résultats 1 ou des 2 sont obtenus sur ces dés d'attaque, ce véhicule perd immédiatement un Point de Carrosserie pour chacun de ces résultats.
      - Un véhicule peut être équipé à la fois d'un Bélier et d'un Bélier Explosif sur la même orientation, et leurs effets sont cumulatifs.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Blindage"
    nom_interne: "blindage"
    comportement: "blindage"
    prix: 4
    emplacement: 1
    description: |
      Plaques de protection rivetées augmentant la structure de carrosserie maximale de manière permanente.
    regles: |
      - Ce véhicule voit sa Valeur de Carrosserie augmentée de 2 de façon permanente.
      - Un même véhicule peut être équipé de plusieurs améliorations Blindage pour un gain de +2 Points de Carrosserie à chaque fois.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Catapulte Improvisée"
    nom_interne: "catapulte_improvisee"
    prix: 2
    emplacement: 1
    description: |
      Dispositif permettant de projeter des armes largables à portée moyenne dans un arc de 360°.
    regles: |
      - Le propriétaire de ce véhicule peut placer le gabarit de Zone adapté (Petite ou Grande Zone, selon l'arme) de ses armes largables où il souhaite.
      - Ce gabarit peut être positionné au maximum à Portée Moyenne de la position actuelle du véhicule.
      - Le ciblage s'effectue librement dans un Arc de Tir à 360°.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Chenilles"
    nom_interne: "chenilles"
    comportement: "chenilles"
    prix: 4
    emplacement: 1
    description: |
      Remplacement des roues par des chenilles de char pour ignorer les terrains difficiles et augmenter la manœuvrabilité.
    regles: |
      - Ceci augmente de 1 la manœuvrabilité du véhicule.
      - En contrepartie, réduit de 1 sa Vitesse maximale.
      - Ce véhicule peut également ignorer les Terrains Difficiles et Dangereux.
      - Un véhicule ne peut acheter cette amélioration qu'une seule fois.
      - Les Chars d'Assaut, les Hélicoptères et les Gyrocoptères ne peuvent pas acheter de Chenilles.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Membre d'Équipage Supplémentaire standard (tous SAUF Scarlett) ─────────
  - nom: "Membre d'Équipage Supplémentaire"
    nom_interne: "membre_equipage_sup"
    comportement: "membre_equipage"
    prix: 4
    emplacement: 0
    description: |
      Ajoute un passager pour augmenter la valeur d'équipage et le nombre d'attaques réalisables.
    regles: |
      - Chaque Membre d'Équipage supplémentaire acheté augmente de 1 la Valeur d'Équipage du véhicule.
      - Ceci augmente le nombre d'attaques que le véhicule peut effectuer lors de son Étape d'Attaque.
      - Le nombre maximum de Membres d'Équipage que peut accueillir un véhicule est égal au double de sa Valeur d'Équipage de départ.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Variante Scarlett : Membre d'Équipage Supplémentaire demi-prix ─────────
  - nom: "Membre d'Équipage Supplémentaire (Scarlett)"
    nom_interne: "membre_equipage_sup_scarlett"
    comportement: "membre_equipage"
    prix: 2
    emplacement: 0
    description: |
      Recrutement d'un membre d'équipage supplémentaire à moitié prix pour l'équipe Scarlett.
    regles: |
      - Règle exclusive Sponsor (Scarlett - Quartiers de l'Équipage) : Cette équipe peut acheter l'amélioration Membre d'Équipage Supplémentaire pour la moitié du prix indiqué.
      - Chaque Membre d'Équipage supplémentaire acheté augmente de 1 la Valeur d'Équipage du véhicule.
      - Ceci augmente le nombre d'attaques que le véhicule peut effectuer lors de son Étape d'Attaque.
      - Le nombre maximum de Membres d'Équipage que peut accueillir un véhicule est égal au double de sa Valeur d'Équipage de départ.
    sponsors_autorises:
      - "Scarlett"

  # ── Nitro standard (tous les sponsors SAUF Idris) ─────────────────────────
  - nom: "Nitro"
    nom_interne: "nitro"
    prix: 6
    emplacement: 0
    description: |
      Boost jetable provoquant un déplacement forcé rectiligne long et fixant le danger à un niveau élevé.
    regles: |
      - Cette amélioration dispose d'une limitation initiale fixée à 1 munition.
      - Une fois par activation, au début d'une Étape de Déplacement, ce véhicule peut annoncer qu'il va utiliser sa Nitro.
      - Ce véhicule effectue alors immédiatement un déplacement forcé avec le gabarit droit Long, après quoi il prend des Jetons Danger jusqu'à en avoir 5.
      - Il résout ensuite normalement son Étape de Déplacement mais sans possibilité de se déplacer en marche arrière.
      - À la fin de l'Étape de Déplacement où ce véhicule a utilisé sa Nitro, il prend des Jetons Danger jusqu'à en avoir un minimum de 5.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Variante Idris : Nitro à moitié prix ──────────────────────────────────
  - nom: "Nitro (Idris)"
    nom_interne: "nitro_idris"
    prix: 3
    emplacement: 0
    description: |
      Système de Nitro acheté à prix réduit pour l'équipe Idris, générant moins de danger lors de son utilisation.
    regles: |
      - Règle exclusive Sponsor (Idris - Accro à la Nitro) : Cette équipe peut acheter des améliorations Nitro pour la moitié du prix indiqué.
      - Une fois par activation, au début d'une Étape de Déplacement, ce véhicule peut annoncer qu'il va utiliser sa Nitro.
      - Ce véhicule effectue alors immédiatement un déplacement forcé avec le gabarit droit Long.
      - Règle exclusive Sponsor (Idris - Démon de la Vitesse) : Lorsque ce véhicule prend des Jetons Danger en utilisant sa Nitro, il n'en prend que jusqu'à en avoir 3 au lieu de 5.
      - Il résout ensuite normalement son Étape de Déplacement mais sans possibilité de se déplacer en marche arrière.
      - À la fin de l'Étape de Déplacement où ce véhicule a utilisé sa Nitro, il prend des Jetons Danger jusqu'à en avoir un minimum de 3 au lieu de 5.
    sponsors_autorises:
      - "Idris"

  # ── Améliorations exclusives (un seul sponsor) ───────────────────────────

  - nom: "Réacteur Nucléaire Expérimental"
    nom_interne: "reacteur_nucleaire"
    comportement: "mishkin_exclusif"
    prix: 5
    emplacement: 0
    description: |
      Prototype Mishkin non léger augmentant la vitesse maximale, modifiant le gabarit long et explosant lourdement en cas d'échec.
    regles: |
      - Cette amélioration est réservée uniquement pour les équipes sponsorisées par Mishkin.
      - Cette amélioration ne peut pas être achetée pour les véhicules de Poids Léger.
      - Un véhicule ne peut acheter cette amélioration qu'une seule fois.
      - Augmente de 2 la Vitesse maximale de ce véhicule (jusqu'à un maximum de 6).
      - Ce véhicule considère le gabarit de déplacement droit Long comme étant autorisé à n'importe quelle Vitesse.
      - Le gabarit droit Long n'est considéré comme Dangereux ou Trivial dans aucune vitesse.
      - Si ce véhicule échoue à un Test de Contrôle, il devient immédiatement une Épave et explose automatiquement.
      - Lorsque ce véhicule explose, il est considéré comme étant de Poids Lourd.
    sponsors_autorises:
      - "Mishkin"

  - nom: "Téléporteur Expérimental"
    nom_interne: "teleporteur"
    comportement: "mishkin_exclusif"
    prix: 7
    emplacement: 0
    description: |
      Module électrique Mishkin permettant un bond de position avant le déplacement, sujet à une déviation ennemie sur un résultat de danger.
    regles: |
      - Cette amélioration est réservée uniquement pour les équipes sponsorisées par Mishkin.
      - Un véhicule ne peut acheter cette amélioration qu'une seule fois.
      - Au début de l'activation de ce véhicule, il peut choisir d'activer son Téléporteur Expérimental avant (et en plus de) son Étape de Déplacement normale.
      - Lorsque le Téléporteur Expérimental est activé, ce véhicule prend 3 Jetons Danger et son propriétaire lance un Dé de Manœuvre.
      - Si le résultat du Dé de Manœuvre est autre qu'un Danger, placez ce véhicule n'importe où à Portée Moyenne maximum de sa position actuelle, sans modifier son orientation, et hors de contact avec un obstacle ou un terrain Difficile ou Dangereux.
      - Ce déplacement réussi n'occasionne pas de Collision et le véhicule commence son Étape de Déplacement à partir de cette nouvelle position.
      - Si le résultat du Dé de Manœuvre est un Danger, le joueur à gauche du propriétaire du véhicule place ce dernier n'importe où à Portée Longue maximum de sa position actuelle, sans qu'il soit en contact avec un obstacle ou un terrain Difficile ou Dangereux, et sans modifier son orientation.
      - Ce déplacement dévié n'occasionne pas de Collision.
    sponsors_autorises:
      - "Mishkin"

  - nom: "Tourelle"
    nom_interne: "tourelle"
    prix: "x3"
    emplacement: 0
    description: |
      Modification d'arme triplant son coût pour lui accorder un arc de tir complet à 360°.
    regles: |
      - Lorsque vous achetez une arme de tir pour ce véhicule, vous pouvez payer trois fois son coût de base pour la monter sur Tourelle.
      - Une arme montée sur Tourelle bénéficie d'un Arc de Tir à 360°.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Améliorations exclusives — La Patrouille de l'Autoroute ───────────────
  - nom: "Mégaphone"
    nom_interne: "megaphone"
    prix: 2
    emplacement: 0
    description: |
      Haut-parleur exclusif à la Patrouille propageant l'effet de sirène à l'ensemble des véhicules adverses.
    regles: |
      - Cette amélioration est exclusive aux équipes sponsorisées par La Patrouille de l'Autoroute.
      - Appliquez la règle spéciale de la Sirène à tout véhicule adverse et non uniquement au Bandit.
      - En vertu de la règle Sirène, à la fin de l'Étape d'Attaque de ce véhicule, s'il se trouve dans l'Arc de Tir arrière d'un véhicule affecté, ce dernier doit soit réduire sa Vitesse actuelle de 1 (et ainsi prendre un Jeton Danger), soit prendre 2 Jetons Danger.
    sponsors_autorises:
      - "La Patrouille de l'Autoroute"

  # ── Améliorations exclusives — Verney ─────────────────────────────────────
  - nom: "Micro-Blindage"
    nom_interne: "micro_blindage"
    comportement: "blindage"
    prix: 6
    emplacement: 0
    description: |
      Blindage compact conçu par Verney pour augmenter définitivement la carrosserie sans utiliser d'emplacement.
    regles: |
      - Cette amélioration est exclusive aux équipes sponsorisées par Verney.
      - Elle augmente de 2 la Valeur de Carrosserie permanente du véhicule.
    sponsors_autorises:
      - "Verney"

  # ── Améliorations exclusives — Rusty et ses Trafiquants d'Alcool ──────────

  - nom: "Remorque de Transport"
    nom_interne: "remorque_transport"
    prix: 0
    emplacement: 0
    description: |
      Module octroyé aux remorques et forteresses de Rusty, appliquant une série de règles spéciales thématiques.
    regles: |
      - Chaque véhicule de cette équipe qui possède l'amélioration Remorque et chaque Forteresse Mobile de cette équipe peut avoir gratuitement une unique amélioration Remorque de Transport.
      - Règle Tord-boyaux de Pêche : Les Cocktails Molotov de ce véhicule sont considérés comme ayant un nombre illimité de Jetons Munition.
      - Règle Turbo de Fond de Tonneau : À la fin de l’Étape de Déplacement de ce véhicule, s’il cumule au moins 5 Jetons Danger, il doit immédiatement effectuer un déplacement forcé vers l’avant avec le gabarit droit Long.
      - Règle Pompe à Syphon : Au début de l’Étape d’Attaque de ce véhicule, qu’il soit Désorienté ou non, ce véhicule peut prendre jusqu’à un Jeton Danger de chaque véhicule à Portée Courte de lui et le placer sur lui.
      - Règle Liqueur de Maïs à l’Ancienne : Lorsqu’un véhicule à Portée Moyenne de ce véhicule (dont lui-même) prend un ou plusieurs Jetons Danger, il prend un Jeton Danger supplémentaire.
      - Règle Marteau à Bovins : Ce véhicule peut considérer que sa Vitesse actuelle est la valeur de son choix, jusqu’à sa Vitesse maximale, lors de l’Étape de Perte de Contrôle et également lors des Collisions résolues durant l’Étape de Perte de Contrôle.
    sponsors_autorises:
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Remorque Légère"
    nom_interne: "remorque_legere"
    prix: 4
    emplacement: 0
    description: |
      Châssis articulé léger pour véhicule moyen ou lourd, conférant les règles de convoi et une remorque de transport.
    regles: |
      - Cette amélioration est une remorque à Accès Limité qui ne peut être achetée que par les équipes de Rusty et ses Trafiquants d'Alcool.
      - Un véhicule ne peut être équipé que d’une seule remorque.
      - Un véhicule équipé d’une Remorque gagne les règles spéciales Articulé, Mastodonte et Passage en Force.
      - Lorsque vous achetez une arme pour un véhicule avec remorque, le joueur doit annoncer si cette arme est installée côté cabine ou côté remorque.
      - Lorsque vous mesurez les portées, placez le gabarit de tir au contact de la cabine ou de la remorque, selon la position de l’arme.
    sponsors_autorises:
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Remorque Moyenne"
    nom_interne: "remorque_moyenne"
    prix: 8
    emplacement: 0
    description: |
      Châssis articulé moyen pour véhicule moyen ou lourd, conférant les règles de convoi et un emplacement d'arrimage d'arme.
    regles: |
      - Cette amélioration est une remorque à Accès Limité qui ne peut être achetée que par des véhicules de Poids Moyen et Lourd sponsorisés par Rusty.
      - Un véhicule ne peut être équipé que d’une seule remorque.
      - Un véhicule équipé d’une Remorque gagne les règles spéciales Articulé, Mastodonte et Passage en Force.
      - Règle Arrimage : Les remorques de Poids Moyen fournissent 1 Emplacement supplémentaire au véhicule remorqueur.
      - Lorsque vous achetez une arme pour un véhicule avec remorque, le joueur doit annoncer si cette arme est installée côté cabine ou côté remorque.
      - Lorsque vous mesurez les portées, placez le gabarit de tir au contact de la cabine ou de la remorque, selon la position de l’arme.
    sponsors_autorises:
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Remorque Lourde"
    nom_interne: "remorque_lourde"
    prix: 12
    emplacement: 0
    description: |
      Châssis articulé lourd réservé aux véhicules lourds, conférant les règles de convoi et trois emplacements d'arrimage.
    regles: |
      - Cette amélioration est une remorque à Accès Limité qui ne peut être achetée que par des véhicules de Poids Lourd sponsorisés par Rusty.
      - Un véhicule ne peut être équipé que d’une seule remorque.
      - Un véhicule équipé d’une Remorque gagne les règles spéciales Articulé, Mastodonte et Passage en Force.
      - Règle Arrimage : Les remorques de Poids Lourd fournissent 3 Emplacements supplémentaires au véhicule remorqueur.
      - Lorsque vous achetez une arme pour un véhicule avec remorque, le joueur doit annoncer si cette arme est installée côté cabine ou côté remorque.
      - Lorsque vous mesurez les portées, placez le gabarit de tir au contact de la cabine ou de la remorque, selon la position de l’arme.
