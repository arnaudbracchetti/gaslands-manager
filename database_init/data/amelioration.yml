# ── Catalogue des améliorations de véhicule Gaslands ──────────────────────────
#
# Ce fichier est chargé une seule fois au démarrage par CatalogService.
# Chaque amélioration déclare les sponsors autorisés à l'acheter via sponsors_autorises.
#
# Structure de chaque entrée :
#   nom          — Nom affiché dans l'UI
#   nom_interne  — Identifiant technique stable (snake_case, sans accents)
#                  Format variante sponsor : "<amelioration>_<sponsor>"
#                  Ex : "nitro_idris" pour la Nitro à moitié prix pour Idris.
#                  Items exclusifs : nom descriptif simple (ex: "megaphone").
#   prix         — Coût en Jerricans.
#                  Cas particulier : la Tourelle utilise "x3" (string, pas un nombre).
#                  Cela signifie que son coût = 3× le prix de l'arme montée dessus.
#                  La Tourelle ne s'applique qu'aux armes (jamais aux améliorations).
#   emplacement  — Slots occupés sur le véhicule (0 = n'occupe pas de slot)
#   description  — Texte libre affiché dans l'UI
#   regles       — Règles spéciales au format liste Markdown
#   sponsors_autorises — Sponsors pouvant acheter cette amélioration
#
# Convention pour les variantes sponsor :
#   Quand un sponsor bénéficie d'un prix réduit ou d'un emplacement modifié,
#   on crée une variante :
#     - La variante porte "(Sponsor)" dans son nom affiché
#     - La variante a un nom_interne avec suffixe sponsor
#     - Le sponsor est RETIRÉ de l'original (qui garde les autres sponsors)
#   Ainsi chaque sponsor voit exactement une version de l'amélioration.

ameliorations_vehicules:

  # ── Améliorations standard (disponibles à tous les sponsors) ──────────────

  - nom: "Arceaux"
    nom_interne: "arceaux"       # Identifiant technique stable
    prix: 4                      # Coût en Jerricans
    emplacement: 1               # Slots occupés sur le véhicule
    description: |               # Texte libre affiché dans l'UI
      Protection structurelle renforçant le véhicule lorsqu'il part en tonneau.
    regles: |                    # Règles spéciales au format liste Markdown
      - Lorsque ce véhicule part en **Tonneau**, il peut choisir d'ignorer les deux dégâts infligés par le Tonneau.
    sponsors_autorises:          # Sponsors pouvant acheter cette amélioration
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Bélier standard (tous les sponsors SAUF Slime) ────────────────────────
  # Slime utilise "Bélier (Slime)" ci-dessous, qui ne requiert aucun emplacement.
  - nom: "Bélier"
    nom_interne: "belier"
    comportement: "belier"       # Clé du décorateur métier — partagée avec "Bélier (Slime)" :
                                 # même règle de pose (orientation, unicité par position),
                                 # seuls prix/emplacement diffèrent (cf. CatalogService)
    prix: 4
    emplacement: 1               # Occupe 1 slot — Slime a une variante à 0 slot
    description: |
      Arme de choc fixée au véhicule : tête de bélier, lame de pelleteuse, pare-buffle, tronçonneuse, pointes, faux ou tout autre dispositif de combat rapproché.
    regles: |
      - Lors de l'achat, définissez l'orientation du Bélier comme pour une arme.
      - Un véhicule ne peut acheter qu'un seul **Bélier** par orientation.
      - Lorsqu'il est impliqué dans une Collision sur l'orientation définie, ce véhicule peut ajouter **+2 dés d'attaque** à son Éperonnage.
      - Lors de cette Collision, ce véhicule ne prend pas les Jetons Danger dus à la Collision.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "La Geôlière"            # Slime absent : utilise "Bélier (Slime)" à emplacement 0
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Variante Slime : Bélier sans emplacement ──────────────────────────────
  # Règle Slime "Hérissé" : le Bélier ne requiert aucun Emplacement.
  - nom: "Bélier (Slime)"
    nom_interne: "belier_slime"  # Suffixe _slime identifie la variante sponsor
    comportement: "belier"       # Même comportement que "Bélier" : même classe instanciée,
                                 # même règle de pose — seul l'emplacement change (0 ici)
    prix: 4                      # Même prix que l'original
    emplacement: 0               # 0 slot au lieu de 1 (avantage Slime)
    description: |
      Bélier sans emplacement réservé à Slime. Règle spéciale Hérissé : le Bélier ne requiert aucun Emplacement sur le véhicule.
    regles: |
      - Lors de l'achat, définissez l'orientation du Bélier comme pour une arme.
      - Un véhicule ne peut acheter qu'un seul **Bélier** par orientation.
      - Lorsqu'il est impliqué dans une Collision sur l'orientation définie, ce véhicule peut ajouter **+2 dés d'attaque** à son Éperonnage.
      - Lors de cette Collision, ce véhicule ne prend pas les Jetons Danger dus à la Collision.
    sponsors_autorises:
      - "Slime"                  # Variante exclusive Slime

  - nom: "Bélier Explosif"
    nom_interne: "belier_explosif"
    comportement: "belier_explosif"   # Décorateur indépendant — pas de lien avec "Bélier"
                                      # malgré la proximité de nom (cf. règles ci-dessous :
                                      # explicitement compatibles et cumulatifs)
    prix: 3
    emplacement: 0
    description: |
      Bélier à usage explosif, conçu pour produire un impact initial extrêmement violent, mais dangereux pour son propre véhicule.
    regles: |
      - **1 Munition**.
      - Lors de l'achat, définissez l'orientation du Bélier Explosif comme pour une arme.
      - Un véhicule ne peut acheter cette amélioration qu'une seule fois.
      - Cette amélioration ne peut pas être achetée par les véhicules de **Poids Léger**.
      - La première fois de la partie que ce véhicule est impliqué dans une Collision sur l'orientation définie, son propriétaire doit annoncer un **Éperonnage**, même en cas de Collision Arrière.
      - Lors de cet Éperonnage, ce véhicule gagne **+6 dés d'attaque**.
      - Si des résultats **1** ou **2** sont obtenus sur ces dés d'attaque, ce véhicule perd immédiatement **1 Point de Carrosserie** pour chacun de ces résultats.
      - Un véhicule peut être équipé à la fois d'un **Bélier** et d'un **Bélier Explosif** sur la même orientation.
      - Les effets du Bélier et du Bélier Explosif sont cumulatifs.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Blindage"
    nom_interne: "blindage"
    comportement: "blindage"     # +2 carrosserie, cumulable sans limite — règle partagée
                                 # avec "Micro-Blindage" (même effet, seuls prix/emplacement
                                 # diffèrent), cf. plus bas
    prix: 4
    emplacement: 1
    description: |
      Plaques de blindage supplémentaires augmentant durablement la résistance du véhicule.
    regles: |
      - Ce véhicule augmente sa Valeur de **Carrosserie** de **+2** de façon permanente.
      - Un même véhicule peut acheter plusieurs améliorations **Blindage**.
      - Chaque achat ajoute à nouveau **+2 Points de Carrosserie**.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Catapulte Improvisée"
    nom_interne: "catapulte_improvisee"
    prix: 2
    emplacement: 1
    description: |
      Dispositif bricolé permettant de projeter les armes largables à distance plutôt que de les déposer directement derrière le véhicule.
    regles: |
      - Le propriétaire de ce véhicule peut placer le gabarit de Zone adapté de ses armes largables, **Petite Zone** ou **Grande Zone** selon l'arme, où il le souhaite à **Portée Moyenne** maximum de la position actuelle du véhicule.
      - Le placement s'effectue dans un **Arc de Tir à 360°**.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  - nom: "Chenilles"
    nom_interne: "chenilles"
    comportement: "chenilles"    # -1 vitesse_max / +1 manœuvrabilité, unique, incompatible
                                 # avec Char d'Assaut / Hélicoptère / Gyrocoptère
    prix: 4
    emplacement: 1
    description: |
      Remplacement des roues par des chenilles de char, améliorant la motricité et la manœuvrabilité au prix de la vitesse maximale.
    regles: |
      - Ce véhicule gagne **+1 Manœuvrabilité**.
      - Ce véhicule subit **-1 Vitesse maximale**.
      - Ce véhicule peut ignorer les **Terrains Difficiles** et les **Terrains Dangereux**.
      - Un véhicule ne peut acheter cette amélioration qu'une seule fois.
      - Les **Chars d'Assaut**, les **Hélicoptères** et les **Gyrocoptères** ne peuvent pas acheter cette amélioration.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Membre d'Équipage Supplémentaire standard (tous SAUF Scarlett) ─────────
  # Scarlett utilise "Membre d'Équipage Supplémentaire (Scarlett)" à moitié prix.
  - nom: "Membre d'Équipage Supplémentaire"
    nom_interne: "membre_equipage_sup"
    comportement: "membre_equipage"   # +1 équipage, max = 2× l'équipage de départ — règle
                                      # partagée avec la variante Scarlett ci-dessous
    prix: 4                      # Prix standard — Scarlett a une variante à 2 Jerricans
    emplacement: 0
    description: |
      Ajout d'un membre d'équipage, augmentant la capacité du véhicule à effectuer des attaques.
    regles: |
      - Chaque **Membre d'Équipage Supplémentaire** augmente de **+1** la Valeur d'Équipage du véhicule.
      - Cela augmente le nombre d'attaques que le véhicule peut effectuer lors de son Étape d'Attaque.
      - Le nombre maximum de Membres d'Équipage que peut accueillir un véhicule est égal au **double de sa Valeur d'Équipage de départ**.
      - Exemple : un Camion avec Équipage 3 peut acheter jusqu'à 3 Membres d'Équipage Supplémentaires, pour atteindre Équipage 6.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "La Patrouille de l'Autoroute"  # Scarlett absente : utilise la variante à moitié prix
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Variante Scarlett : Membre d'Équipage Supplémentaire demi-prix ─────────
  # Règle Scarlett "Quartiers de l'Équipage" : coûte moitié prix.
  - nom: "Membre d'Équipage Supplémentaire (Scarlett)"
    nom_interne: "membre_equipage_sup_scarlett"
    comportement: "membre_equipage"   # Même comportement que l'original : même classe,
                                      # même règle — seul le prix change
    prix: 2                      # 4 / 2 = 2 (demi-prix Scarlett)
    emplacement: 0
    description: |
      Membre d'Équipage Supplémentaire à moitié prix pour Scarlett. Règle Quartiers de l'Équipage : coûte 2 Jerricans au lieu de 4.
    regles: |
      - Chaque **Membre d'Équipage Supplémentaire** augmente de **+1** la Valeur d'Équipage du véhicule.
      - Cela augmente le nombre d'attaques que le véhicule peut effectuer lors de son Étape d'Attaque.
      - Le nombre maximum de Membres d'Équipage que peut accueillir un véhicule est égal au **double de sa Valeur d'Équipage de départ**.
      - Exemple : un Camion avec Équipage 3 peut acheter jusqu'à 3 Membres d'Équipage Supplémentaires, pour atteindre Équipage 6.
    sponsors_autorises:
      - "Scarlett"               # Variante exclusive Scarlett

  # ── Nitro standard (tous les sponsors SAUF Idris) ─────────────────────────
  # Idris utilise "Nitro (Idris)" ci-dessous, à moitié prix.
  - nom: "Nitro"
    nom_interne: "nitro"
    prix: 6                      # Prix standard — Idris a une variante à 3 Jerricans
    emplacement: 0
    description: |
      Injection de puissance permettant une accélération brutale au prix d'une forte accumulation de Jetons Danger.
    regles: |
      - **1 Munition**.
      - Une fois par activation, au début d'une Étape de Déplacement, ce véhicule peut annoncer qu'il utilise sa **Nitro**.
      - Il effectue immédiatement un déplacement forcé avec le gabarit droit **Long**.
      - Après ce déplacement forcé, il prend des Jetons Danger jusqu'à en avoir **5**.
      - Il résout ensuite normalement son Étape de Déplacement.
      - Lors de cette Étape de Déplacement, il ne peut pas se déplacer en marche arrière.
      - À la fin de l'Étape de Déplacement où il a utilisé sa Nitro, il prend à nouveau des Jetons Danger jusqu'à en avoir au minimum **5**.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Slime"                  # Idris absent : utilise "Nitro (Idris)" à 3 Jerricans
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Variante Idris : Nitro à moitié prix ──────────────────────────────────
  # Règle Idris "Accro à la Nitro" : l'équipe achète les améliorations Nitro
  # à moitié prix, soit 3 Jerricans au lieu de 6.
  - nom: "Nitro (Idris)"
    nom_interne: "nitro_idris"   # Suffixe _idris identifie la variante sponsor
    prix: 3                      # 6 / 2 = 3 (demi-prix Idris)
    emplacement: 0
    description: |
      Nitro à moitié prix pour Idris. Règle Accro à la Nitro : coûte 3 Jerricans au lieu de 6.
    regles: |
      - **1 Munition**.
      - Une fois par activation, au début d'une Étape de Déplacement, ce véhicule peut annoncer qu'il utilise sa **Nitro**.
      - Il effectue immédiatement un déplacement forcé avec le gabarit droit **Long**.
      - Après ce déplacement forcé, il prend des Jetons Danger jusqu'à en avoir **3** (au lieu de 5 grâce à la règle Démon de la Vitesse d'Idris).
      - Il résout ensuite normalement son Étape de Déplacement.
      - Lors de cette Étape de Déplacement, il ne peut pas se déplacer en marche arrière.
      - À la fin de l'Étape de Déplacement où il a utilisé sa Nitro, il prend à nouveau des Jetons Danger jusqu'à en avoir au minimum **3**.
    sponsors_autorises:
      - "Idris"                  # Variante exclusive Idris

  # ── Améliorations exclusives (un seul sponsor) ───────────────────────────

  - nom: "Réacteur Nucléaire Expérimental"
    nom_interne: "reacteur_nucleaire"            # Amélioration électrique exclusive Mishkin
    comportement: "mishkin_exclusif"   # Règle partagée avec "Téléporteur Expérimental" :
                                       # un seul exemplaire par véhicule (rien d'autre)
    prix: 5
    emplacement: 0
    description: |
      Amélioration électrique expérimentale de Mishkin, augmentant massivement la vitesse potentielle du véhicule, avec un risque catastrophique en cas de perte de contrôle.
    regles: |
      - **Électrique**.
      - Uniquement pour les équipes sponsorisées par **Mishkin**.
      - Cette amélioration ne peut pas être achetée par les véhicules de **Poids Léger**.
      - Un véhicule ne peut acheter cette amélioration qu'une seule fois.
      - Augmentez de **+2** la Vitesse maximale de ce véhicule, jusqu'à un maximum de **6**.
      - Ce véhicule considère le gabarit de déplacement droit **Long** comme autorisé à n'importe quelle Vitesse.
      - Le gabarit droit Long n'est considéré comme **Dangereux** ou **Trivial** à aucune Vitesse.
      - Si ce véhicule échoue à un **Test de Contrôle**, il devient immédiatement une **Épave** et explose automatiquement.
      - Lorsque ce véhicule explose, il est considéré comme étant de **Poids Lourd**.
    sponsors_autorises:
      - "Mishkin"                # Amélioration électrique exclusive Mishkin

  - nom: "Téléporteur Expérimental"
    nom_interne: "teleporteur"                   # Amélioration électrique exclusive Mishkin
    comportement: "mishkin_exclusif"   # Même règle que le Réacteur Nucléaire : un seul
                                       # exemplaire par véhicule
    prix: 7
    emplacement: 0
    description: |
      Amélioration électrique expérimentale de Mishkin permettant de déplacer instantanément un véhicule, avec un risque de téléportation incontrôlée.
    regles: |
      - **Électrique**.
      - Uniquement pour les équipes sponsorisées par **Mishkin**.
      - Un véhicule ne peut acheter cette amélioration qu'une seule fois.
      - Au début de l'activation de ce véhicule, il peut activer son **Téléporteur Expérimental** avant, et en plus de, son Étape de Déplacement normale.
      - Lorsque le Téléporteur est activé, ce véhicule prend **3 Jetons Danger**.
      - Son propriétaire lance ensuite un **Dé de Manœuvre**.
      - Si le résultat n'est pas **Danger**, placez ce véhicule n'importe où à **Portée Moyenne** maximum de sa position actuelle.
      - Il ne peut pas être placé en contact avec un obstacle ou un terrain Difficile ou Dangereux.
      - Son orientation ne change pas.
      - Ce déplacement ne provoque pas de Collision.
      - Le véhicule commence ensuite son Étape de Déplacement depuis cette nouvelle position.
      - Si le résultat est **Danger**, le joueur à gauche du propriétaire place ce véhicule n'importe où à **Portée Longue** maximum de sa position actuelle.
      - Dans ce cas également, le véhicule ne peut pas être placé en contact avec un obstacle ou un terrain Difficile ou Dangereux, son orientation ne change pas et cela ne provoque pas de Collision.
    sponsors_autorises:
      - "Mishkin"                # Amélioration électrique exclusive Mishkin

  - nom: "Tourelle"
    nom_interne: "tourelle"
    prix: "x3"                   # Coût multiplicateur : 3× le prix de l'arme montée dessus
                                 # Uniquement applicable aux armes (jamais aux améliorations)
    emplacement: 0
    description: |
      Montage spécial d'une arme de tir permettant de lui donner un Arc de Tir à 360°.
    regles: |
      - Lorsque vous achetez une arme de tir pour ce véhicule, vous pouvez payer **trois fois son coût de base** pour la monter sur Tourelle.
      - Une arme montée sur Tourelle bénéficie d'un **Arc de Tir à 360°**.
      - Exemple : un Minigun coûtant 5 Jerricans coûte 15 Jerricans s'il est monté sur Tourelle.
    sponsors_autorises:
      - "Rutherford"
      - "Miyazaki"
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

  # ── Améliorations exclusives — La Patrouille de l'Autoroute ───────────────
  # Règle "Mégaphone" : permet d'appliquer la règle Sirène à tout véhicule adverse
  # (et pas seulement au Bandit désigné).
  - nom: "Mégaphone"
    nom_interne: "megaphone"     # Amélioration exclusive La Patrouille
    prix: 2
    emplacement: 0
    description: |
      Amélioration exclusive à La Patrouille de l'Autoroute. Permet d'appliquer la règle Sirène à n'importe quel véhicule adverse, et non seulement au Bandit désigné.
    regles: |
      - Si ce véhicule est dans l'Arc Arrière d'un véhicule adverse (et pas uniquement le Bandit), ce véhicule adverse doit réduire sa Vitesse ou prendre 2 Jetons Danger.
    sponsors_autorises:
      - "La Patrouille de l'Autoroute"  # Amélioration exclusive La Patrouille

  # ── Améliorations exclusives — Verney ─────────────────────────────────────
  # Règle "Micro-Blindage" : +2 Carrosserie pour 6 Jerricans, sans slot.
  # Différent du Blindage standard (4j, 1 emplacement).
  - nom: "Micro-Blindage"
    nom_interne: "micro_blindage"               # Amélioration exclusive Verney
    comportement: "blindage"     # Même règle que "Blindage" (+2 carrosserie permanent,
                                 # cumulable sans limite) — seuls prix/emplacement diffèrent ;
                                 # même classe instanciée, aucune duplication de logique
    prix: 6
    emplacement: 0               # Aucun slot requis (avantage vs Blindage standard à 1 slot)
    description: |
      Amélioration exclusive à Verney. Renforce la carrosserie de 2 points sans occuper d'emplacement, grâce aux techniques d'ingénierie avancées de l'ancien prisonnier.
    regles: |
      - Ce véhicule augmente sa Valeur de **Carrosserie** de **+2** de façon permanente.
      - Cette amélioration n'occupe aucun Emplacement.
      - Un même véhicule peut acheter plusieurs améliorations **Micro-Blindage**.
    sponsors_autorises:
      - "Verney"                 # Amélioration exclusive Verney

  # ── Améliorations exclusives — Rusty et ses Trafiquants d'Alcool ──────────
  # Les Remorques s'attachent aux véhicules Moyens/Lourds et ajoutent des
  # emplacements d'armes. Elles sont obligatoires : l'équipe Rusty doit
  # inclure au moins un véhicule avec Remorque ou une Forteresse Mobile.

  - nom: "Remorque de Transport"
    nom_interne: "remorque_transport"
    prix: 0                      # Gratuite : chaque véhicule avec Remorque la reçoit automatiquement
    emplacement: 0
    description: |
      Remorque de transport offerte gratuitement par Rusty à chaque véhicule équipé d'une Remorque (Légère, Moyenne ou Lourde) ou à chaque Forteresse Mobile de l'équipe.
    regles: |
