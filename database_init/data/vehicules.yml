# ── Catalogue des véhicules Gaslands ──────────────────────────────────────────
#
# Ce fichier est chargé une seule fois au démarrage par CatalogService
# (apps/backend/src/app/catalog/catalog.service.ts).
# Les données sont conservées en mémoire ; toute modification nécessite un
# redémarrage du serveur pour être prise en compte.
#
# Chaque véhicule déclare la liste des sponsors autorisés à l'acheter via
# sponsors_autorises. Si un sponsor n'y figure pas, il ne peut pas acheter
# ce véhicule — c'est le seul mécanisme de restriction d'achat.
#
# Convention pour les variantes sponsor :
#   - Le champ nom_interne prend la forme "<vehicule>_<modificateur>"
#     (ex : "voiture_prison" pour la variante Prison de La Geôlière).
#   - Le nom affiché (nom) porte la mention "(Prison)" entre parenthèses.
#   - La variante est accessible UNIQUEMENT au sponsor concerné.
#   - Le véhicule de base reste accessible à tous les autres sponsors.

vehicules:

  # ── Véhicules de Poids Léger ───────────────────────────────────────────────
  # Note : Rutherford est interdit d'achat sur tous les Légers (règle du sponsor).

  - nom: "Dragster"              # Nom affiché dans l'UI et dans le carousel de construction
    nom_interne: "dragster"      # Identifiant technique stable (snake_case, sans accents)
    poids: "Léger"               # Catégorie de poids : Léger | Moyen | Lourd
                                 # Détermine les règles de collision et les restrictions sponsor
    carrosserie: 4               # Points de résistance aux dégâts (0 = le véhicule devient une Épave)
    manoeuvrabilite: 4           # Nombre de dés de manœuvre lancés pour le déplacement (1-5)
                                 # Miyazaki interdit les véhicules avec manoeuvrabilite < 3
    vitesse_max: 6               # Vitesse maximale autorisée (1-6)
    equipage: 1                  # Nombre d'attaques disponibles par Étape d'Attaque
    emplacements: 2              # Nombre de slots disponibles pour armes et améliorations (emplacement > 0)
    prix: 5                      # Coût en Jerricans à l'achat
    description: |               # Texte libre présenté dans l'UI (flavor text)
      Véhicule très rapide et fragile, conçu pour les lignes droites, les accélérations violentes et les prises de risque.
    regles: |                    # Règles spéciales au format liste Markdown ("Aucune règle spéciale." si vide)
      - **Moteur à Réaction** : ce véhicule est considéré comme ayant l'amélioration **Nitro** avec un nombre infini de Jetons Munition.
      - **Nitro** : ce véhicule effectue alors immédiatement un déplacement forcé avec le gabarit droit Long, après quoi il prend des Jetons Danger jusqu'à en avoir 5
      - Il explose automatiquement lorsqu'il devient une Épave.
      - Il doit utiliser sa Nitro à chaque activation.
    sponsors_autorises:          # Liste des sponsors pouvant acheter ce véhicule
      - "Miyazaki"               # Rutherford absent : interdit d'acheter les Poids Léger
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
      - "La Patrouille de l'Autoroute"
      - "Verney"
      - "Maxxine"
      - "L'Ordre Infernal"
      - "Beverly, le Diable de l'Autoroute"
      - "Rusty et ses Trafiquants d'Alcool"

