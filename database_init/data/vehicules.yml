  - nom: "Forteresse Mobile"
    nom_interne: "forteresse_mobile"
    poids: "Lourd"
    carrosserie: 26
    manoeuvrabilite: 2           # manoeuvrabilite < 3 → Miyazaki interdit
    vitesse_max: 4
    equipage: 5
    emplacements: 5
    prix: 40
    description: |
      Véhicule massif et articulé, constitué d'une cabine et d'une remorque. Il se comporte comme un véhicule à part, avec des règles propres pour le mouvement, les pertes de contrôle et les collisions.
    regles: |
      - **Articulé — Cabine et Remorque** : la Forteresse Mobile se compose de deux parties : la cabine à l'avant et la remorque à l'arrière.
      - La cabine et la remorque sont connectées par un attelage.
      - **Équipement d'un véhicule articulé** : lorsqu'une arme est achetée, le joueur doit annoncer si elle est montée sur la cabine ou sur la remorque.
      - Pour mesurer une portée, le gabarit de tir est placé contre la cabine ou contre la remorque selon l'emplacement de l'arme.
      - **Déplacement articulé** : la cabine se déplace comme un véhicule normal, séparément de la remorque.
      - Après le déplacement de la cabine, la remorque est replacée en contact avec la cabine.
      - Si un gabarit autre que Droit est choisi, le véhicule prend 1 Jeton Danger.
      - Le gabarit de déplacement est placé au centre de la face avant de la cabine.
      - Les Dés de Manœuvre sont lancés et résolus normalement.
      - La remorque est ignorée pendant le placement de la cabine en Position Finale.
      - La remorque est ensuite replacée de manière à être connectée à l'attelage et à recouvrir autant que possible la surface du gabarit de déplacement.
      - **En arrière toute** : lorsqu'une Forteresse Mobile se déplace en marche arrière, l'arrière de la remorque est considéré comme l'avant de la cabine, et la cabine est considérée comme la remorque.
      - **Pivoter un véhicule articulé** : lorsqu'un véhicule articulé pivote, la cabine et la remorque pivotent ensemble autour de leur centre de rotation commun, comme s'il s'agissait d'un unique véhicule rigide.
      - **Mise en Portefeuille** : si un véhicule articulé part en Tonneau, ne résolvez pas le Tonneau ; résolvez une Mise en Portefeuille.
      - Lors d'une Mise en Portefeuille, le joueur à gauche du propriétaire oriente la remorque dans la position de son choix, sans déconnecter ni chevaucher la cabine. Ceci ouvre une Fenêtre de Collision.
      - Puis le joueur à gauche du propriétaire pivote le véhicule articulé dans l'orientation de son choix. Ceci ouvre une Fenêtre de Collision.
      - Enfin, le véhicule articulé effectue une attaque à 4D6 contre lui-même, qu'il ne peut pas Esquiver.
      - **Mastodonte — Monter en Pression** : au début de son activation, ce véhicule peut prendre 1 Jeton Danger pour ignorer son Étape de Déplacement. Il peut ensuite monter d'une Vitesse.
      - **Mastodonte — Dérapage** : lorsqu'il résout un résultat Dérapage, il ignore le gabarit de Dérapage et ne le place pas. Chaque résultat Dérapage donne tout de même 1 Jeton Danger normalement.
      - **Mastodonte — Perte de Contrôle** : lorsqu'il subit une Perte de Contrôle, le joueur à gauche de son propriétaire ne le pivote pas lors du dernier point de la séquence de Perte de Contrôle. Le véhicule reste orienté comme il est.
      - **Perte de Contrôle de la Forteresse Mobile** : lorsqu'une Forteresse Mobile subit une Perte de Contrôle, un Test de Contrôle raté provoque une Mise en Portefeuille au lieu d'un Tonneau. Elle n'est pas pivotée en fin de Perte de Contrôle.
      - **Passage en Force** : lors de son Étape de Déplacement, lorsqu'elle entre en Collision avec un autre véhicule de Poids plus faible, elle peut annoncer un Passage en Force comme réaction.
      - Un Passage en Force est considéré comme un Éperonnage à tout point de vue, avec un effet supplémentaire.
      - Après résolution de la Collision, le propriétaire de la Forteresse Mobile peut placer le véhicule ciblé n'importe où à Portée Courte maximum de sa position initiale.
      - Il peut ensuite pivoter ce véhicule dans n'importe quelle direction, de sorte qu'il ne rentre pas en Collision avec la Forteresse Mobile lors de la suite de son Étape de Déplacement.
      - Si la Forteresse Mobile possède un Bélier sur l'orientation appropriée, le Passage en Force bénéficie des règles spéciales du Bélier.
