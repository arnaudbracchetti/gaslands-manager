      - **Plein Gaz** : ce véhicule considère le gabarit de déplacement droit Long comme autorisé à n'importe quelle Vitesse.
      - Le gabarit droit Long n'est jamais considéré comme Dangereux ou Trivial, quelle que soit la Vitesse.
      - **Pivot** : au début de son activation, si ce véhicule est en Vitesse 1, il peut pivoter dans n'importe quelle direction autour de son centre de rotation.
      - Ce pivot ne peut pas déclencher de Collision.
      - Ce pivot ne peut pas laisser le véhicule en contact avec un obstacle.
    sponsors_autorises:
      - "Miyazaki"               # Rutherford absent : interdit d'acheter les Poids Léger
      - "Mishkin"
      - "Idris"
      - "Slime"
      - "La Geôlière"
      - "Scarlett"
